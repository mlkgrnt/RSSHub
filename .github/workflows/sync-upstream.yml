name: Sync Upstream

on:
    schedule:
        - cron: '0 0 * * *'
    workflow_dispatch:

permissions:
    contents: write
    workflows: write

jobs:
    sync:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: master
                  fetch-depth: 0

            - name: Sync upstream master
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git remote add upstream https://github.com/DIYgod/RSSHub.git || true
                  git fetch upstream
                  git merge upstream/master --no-edit
                  git push origin master

            - name: Rebase custom onto master
              run: |
                  OLD_CUSTOM=$(git rev-parse origin/custom)
                  MERGE_BASE=$(git merge-base origin/master $OLD_CUSTOM)
                  PATCHES=$(git rev-list --reverse $MERGE_BASE..$OLD_CUSTOM)
                  git checkout -B custom origin/master
                  if [ "$MERGE_BASE" != "$(git rev-parse origin/master)" ] && [ -n "$PATCHES" ]; then
                    for p in $PATCHES; do
                      git cherry-pick $p || git cherry-pick --abort
                    done
                  fi
                  git push origin custom --force-with-lease

            - name: Build deploy
              run: |
                  git checkout -B deploy custom
                  git push origin deploy --force-with-lease
